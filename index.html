<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VetCare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#5eb55f">
</head>
<body>

    <div class="pantalla-sesion">
        <div class="inicio-sesion">
            <div class="encabezado-login">
                <img src="img/logo.png" alt="Logo VetCare" class="logo-imagen" style="width: 40px; height: auto;">
                <h2>VetCare</h2>
            </div>
        
            <div class="eslogan">
                <h1>VetCare</h1>
                <p>Donde el amigo del hombre es atendido</p>
            </div>

            <form class="formulario-sesion" onsubmit="event.preventDefault(); iniciarSesion();">
                <div class="datos-usuario">
                    <label>Usuario / Correo</label>
                    <div class="barra-usuario">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="Ingresa tu nombre de usuario" required>
                    </div>
                </div>

                <div class="datos-contraseña">
                    <label>Contraseña</label>
                    <div class="barra-contraseña">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="Ingresa tu contraseña" required>
                    </div>
                </div>

                <a href="#" class="contraseña-olvidada" onclick="alert('Esta sección está en desarrollo.')">¿Olvidaste tu contraseña?</a>

                <button type="submit" class="btn-iniciar">Iniciar sesión</button>
                
                <p class="crear-cuenta">¿No tienes una cuenta? <a href="#" onclick="alert('Esta sección está en desarrollo.')">Crear cuenta</a></p>
            </form>
        </div>
    </div>

    <script type="text/javascript" src="script.js"></script>
</body>
</html>
